<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모기 지옥 (발 크기 키우고 하단 절반 위치)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* [수정] 발 이미지 스타일 정의 */
        #foot-container {
            position: fixed; /* 화면에 고정 */
            bottom: 0;        /* 화면 바닥에 붙임 */
            left: 50%;       /* 왼쪽에서 50% 위치 */
            transform: translateX(-50%); /* 이미지 자체 너비의 반만큼 왼쪽으로 이동시켜 정확한 중앙 정렬 */
            z-index: 100;    /* 모기들보다 위에 보이도록 설정 */
            pointer-events: none; /* 발 이미지가 클릭을 막지 않도록 설정 */
            /* opacity: 0.8; */ /* 필요하다면 약간 투명하게 설정 가능 */
        }

        #foot-container img {
            width: 500px;    /* [수정] 발 크기 크게 증가 (기존 250px -> 500px) */
            height: auto;    /* 비율 유지 */
            transform: translateY(50%); /* [추가] 이미지 높이의 50%만큼 아래로 이동시켜 하단 절반만 보이게 함 */
        }

        .mosquito {
            position: absolute;
            width: 20px;
            height: 20px;
            user-select: none;
            pointer-events: none;
            top: 0;
            left: 0;
            transform-origin: center center;
            overflow: visible;
        }

        /* 날개 애니메이션 */
        .wing { transform-origin: 10px 10px; }
        .w1 { animation: flap1 0.03s infinite alternate; }
        .w2 { animation: flap2 0.03s infinite alternate; }

        @keyframes flap1 { 0% { transform: rotate(0deg); } 100% { transform: rotate(-40deg); } }
        @keyframes flap2 { 0% { transform: rotate(0deg); } 100% { transform: rotate(40deg); } }
    </style>
</head>
<body>

<div id="foot-container">
    <img src="./image/foot1.png" alt="발">
</div>

<script>
    const mosquitoSVG = `
        <svg width="20" height="20" viewBox="0 0 20 20" style="overflow: visible;">
            <path d="M 5,10 Q 10,8 15,10" fill="none" stroke="black" stroke-width="0.5" />
            <path class="wing w1" d="M 10,10 Q 12,6 14,10" fill="none" stroke="black" stroke-width="0.4" />
            <path class="wing w2" d="M 10,10 Q 12,14 14,10" fill="none" stroke="black" stroke-width="0.4" />
            <polyline points="7,10 6,12 8,14" fill="none" stroke="black" stroke-width="0.4" />
            <polyline points="10,10 9,12 11,14" fill="none" stroke="black" stroke-width="0.4" />
            <polyline points="13,10 12,12 14,14" fill="none" stroke="black" stroke-width="0.4" />
            <line x1="5" y1="10" x2="1" y2="10" stroke="black" stroke-width="0.5" />
        </svg>
    `;

    const mosquitoes = [];

    class Mosquito {
        constructor() {
            this.element = document.createElement('div');
            this.element.className = 'mosquito';
            this.element.innerHTML = mosquitoSVG;

            const margin = 50; 
            const edge = Math.floor(Math.random() * 4); 

            if (edge === 0) { 
                this.x = Math.random() * window.innerWidth;
                this.y = -margin;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = Math.random() * 3 + 2; 
            } else if (edge === 1) { 
                this.x = window.innerWidth + margin;
                this.y = Math.random() * window.innerHeight;
                this.vx = -(Math.random() * 3 + 2);
                this.vy = (Math.random() - 0.5) * 5;
            } else if (edge === 2) { 
                this.x = Math.random() * window.innerWidth;
                this.y = window.innerHeight + margin;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = -(Math.random() * 3 + 2);
            } else { 
                this.x = -margin;
                this.y = Math.random() * window.innerHeight;
                this.vx = Math.random() * 3 + 2;
                this.vy = (Math.random() - 0.5) * 5;
            }
            
            this.dartTimer = Math.random() * 50 + 20;

            document.body.appendChild(this.element);
        }

        update() {
            this.dartTimer--;

            if (this.dartTimer <= 0) {
                const dartAngle = Math.random() * Math.PI * 2;
                const dartForce = Math.random() * 10 + 5;
                this.vx += Math.cos(dartAngle) * dartForce;
                this.vy += Math.sin(dartAngle) * dartForce;
                
                this.dartTimer = Math.random() * 60 + 20;
            }

            this.vx += (Math.random() - 0.5) * 2;
            this.vy += (Math.random() - 0.5) * 2;

            this.vx *= 0.88;
            this.vy *= 0.88;

            const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
            if (speed < 1.5) {
                const angle = Math.atan2(this.vy, this.vx);
                this.vx = Math.cos(angle) * 1.5;
                this.vy = Math.sin(angle) * 1.5;
            }

            this.x += this.vx;
            this.y += this.vy;

            const boundsMargin = 50; 
            if (this.x < -boundsMargin && this.vx < 0) { this.vx *= -1; }
            if (this.x > window.innerWidth + boundsMargin && this.vx > 0) { this.vx *= -1; }
            if (this.y < -boundsMargin && this.vy < 0) { this.vy *= -1; }
            if (this.y > window.innerHeight + boundsMargin && this.vy > 0) { this.vy *= -1; }

            const angle = Math.atan2(this.vy, this.vx) * (180 / Math.PI);
            this.element.style.transform = `translate(${this.x}px, ${this.y}px) rotate(${angle + 180}deg)`;
        }
    }

    function animate() {
        for (let i = 0; i < mosquitoes.length; i++) {
            mosquitoes[i].update();
        }
        requestAnimationFrame(animate);
    }

    setInterval(() => {
        mosquitoes.push(new Mosquito());
    }, 5000);

    mosquitoes.push(new Mosquito());
    
    animate();
</script>

</body>
</html>
